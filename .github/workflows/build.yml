name: Build Rainy iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

    - name: Build Project for iPhone (Unsigned)
      run: xcodebuild clean build -scheme Rainy -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath BuildData/

    - name: Package into IPA
      run: |
        mkdir -p Payload/Rainy.app
        cp BuildData/Build/Products/Debug-iphoneos/Rainy Payload/Rainy.app/
        cat << 'EOF' > Payload/Rainy.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Rainy</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.Rainy</string>
            <key>CFBundleName</key>
            <string>Rainy</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>17.0</string>
            <key>NSSupportsLiveActivities</key>
            <true/>
        </dict>
        </plist>
        EOF
        zip -r Rainy.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rainy-App
        path: Rainy.ipa
